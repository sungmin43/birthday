<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Cake Animation & Confetti</title>
    
    <link rel="stylesheet" href="cake.css" /> 
    <link rel="stylesheet" href="confetti-button-with-pure-javascript/dist/style.css">

    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden; 
      }

      /* 하단 버튼 컨테이너 - 가로 정렬 설정 */
      .button-container {
        position: absolute;
        bottom: 40px;      /* 하단에서 띄울 높이 */
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        
        /* 가로로 나열하기 위한 설정 */
        display: flex;
        flex-direction: row; 
        justify-content: center;
        align-items: center;
        gap: 15px;         /* 버튼이 여러 개일 경우 사이 간격 */
        width: 100%;       /* 가로 폭 확보 */
      }

      /* 폭죽 버튼 스타일 미세 조정 */
      .pumping {
        -webkit-tap-highlight-color: transparent;
        cursor: pointer;
        white-space: nowrap; /* 텍스트가 가로로 길어져도 줄바꿈 방지 */
        /* 필요하다면 여기서 font-size 등을 조절해서 가로 비율을 맞추세요 */
      }
    </style>
  </head>
  <body>
    
    <div class="container">
      <div class="cake-wrapper">
        <div class="header">생일을 축하합니다!!</div>
        <div class="cake">
          <div class="candle"></div>
          <div class="top-layer"></div>
          <div class="middle-layer"></div>
          <div class="bottom-layer"></div>
        </div>
      </div>
    </div>

    <div class="button-container">
      <span class="pumping" data-text="폭죽누르기"></span>
      </div>

    <audio id="jumpSound" src="emerge.mp3"></audio>

    <script>
      const sound = document.getElementById("jumpSound");
      const layers = [".middle-layer", ".top-layer"];

      layers.forEach(selector => {
        const el = document.querySelector(selector);
        if (el) {
          el.addEventListener("animationstart", () => {
            sound.currentTime = 0;
            sound.play().catch(() => {}); 
          });
        }
      });
    </script>

    <script src="confetti-button-with-pure-javascript/dist/script.js"></script>

  </body>
</html>
